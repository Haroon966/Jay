name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Syntax-check Python sources
        run: python3 -m compileall -q protocol tests desktop/linux

  protocol-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run protocol framing tests
        run: python3 tests/test_packet_format.py

      - name: Run constants sync tests
        run: python3 tests/test_constants_sync.py

      - name: Run stream resilience tests
        run: python3 tests/test_stream_resilience.py

  android-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

  firmware-build:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.2
    defaults:
      run:
        working-directory: firmware
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ESP32 firmware
        run: |
          idf.py set-target esp32
          idf.py build
